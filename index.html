<html lang="en">

    <!-- Primary Meta Tags -->
    <title>LUXE - Premium Contemporary Clothing | Shop Men's & Women's Fashion</title>
    <meta name="title" content="LUXE - Premium Contemporary Clothing | Shop Men's & Women's Fashion" />
    <meta name="description" content="Discover premium contemporary clothing at LUXE. Shop the latest collection of men's and women's fashion, footwear, and accessories. Free shipping on orders above ₹2,500." />

    <meta name="author" content="LUXE" />
    <meta name="robots" content="index, follow" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://luxe-clothing.com/" />
    <meta property="og:title" content="LUXE - Premium Contemporary Clothing" />

    <meta property="twitter:url" content="https://luxe-clothing.com/" />
    <meta property="twitter:title" content="LUXE - Premium Contemporary Clothing" />
    <meta property="twitter:description" content="Discover premium contemporary clothing at LUXE. Shop the latest collection of men's and women's fashion." />
    <meta property="twitter:image" content="https://luxe-clothing.com/og-image.jpg" />
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://luxe-clothing.com/" />
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#171717" />
    
    <!-- Preconnect to external domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
